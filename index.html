<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>To-Do List Avançado</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

/* CONTAINER */
.container {
    background: #fff;
    padding: 20px;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

/* INPUTS */
input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

/* BOTÃO */
button {
    background-color: #007BFF;
    color: white;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

/* LISTA */
ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
    animation: aparecer 0.3s ease;
}

li:hover {
    transform: scale(1.02);
}

/* ANIMAÇÃO DE ENTRADA */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* REMOÇÃO */
.removendo {
    opacity: 0;
    transform: translateX(50px);
}

/* PRIORIDADES */
.alta {
    background-color: #ff4d4d;
    color: white;
}

.media {
    background-color: #ffc107;
}

.baixa {
    background-color: #28a745;
    color: white;
}

/* CONCLUÍDA */
.concluida {
    text-decoration: line-through;
    opacity: 0.6;
    transform: scale(0.98);
}

/* BOTÕES DA TAREFA */
.task-buttons {
    display: flex;
    gap: 5px;
}

.task-buttons button {
    width: 40px;
}
</style>
</head>

<body>

<div class="container">
    <h1>To-Do List</h1>

    <input type="text" id="tarefa" placeholder="Digite uma tarefa">

    <select id="prioridade">
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
    </select>

    <button onclick="adicionarTarefa()">Adicionar</button>

    <ul id="lista"></ul>
</div>

<script>
let tarefas = [];

// ADICIONAR
function adicionarTarefa() {
    const input = document.getElementById("tarefa");
    const prioridade = document.getElementById("prioridade").value;

    if (input.value.trim() === "") {
        alert("Digite uma tarefa!");
        return;
    }

    const tarefa = {
        id: Date.now(),
        texto: input.value,
        prioridade: prioridade,
        concluida: false
    };

    tarefas.push(tarefa);
    render();

    input.value = "";
}

// RENDERIZAR
function render() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    tarefas.forEach(tarefa => {
        const li = document.createElement("li");

        li.className = tarefa.prioridade + (tarefa.concluida ? " concluida" : "");
        li.setAttribute("data-id", tarefa.id);

        const span = document.createElement("span");
        span.textContent = tarefa.texto;
        span.onclick = () => toggleTarefa(tarefa.id);

        const botoes = document.createElement("div");
        botoes.className = "task-buttons";

        // BOTÃO CONCLUIR
        const btnCheck = document.createElement("button");
        btnCheck.textContent = "✔";
        btnCheck.onclick = () => toggleTarefa(tarefa.id);

        // BOTÃO EXCLUIR
        const btnDelete = document.createElement("button");
        btnDelete.textContent = "X";
        btnDelete.onclick = () => removerTarefa(tarefa.id);

        botoes.appendChild(btnCheck);
        botoes.appendChild(btnDelete);

        li.appendChild(span);
        li.appendChild(botoes);

        lista.appendChild(li);
    });
}

// CONCLUIR
function toggleTarefa(id) {
    tarefas = tarefas.map(t =>
        t.id === id ? { ...t, concluida: !t.concluida } : t
    );
    render();
}

// REMOVER COM ANIMAÇÃO
function removerTarefa(id) {
    const item = document.querySelector(`li[data-id='${id}']`);

    if (item) {
        item.classList.add("removendo");

        setTimeout(() => {
            tarefas = tarefas.filter(t => t.id !== id);
            render();
        }, 300);
    }
}
</script>

</body>
</html>
